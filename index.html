<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Lightweight PWA for manager bookmarks with a stylish personalizations and better order">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/main.css">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-title" content="Vision Marks">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lato:wght@400;700&family=Montserrat:wght@400;500;600&family=Open+Sans:wght@400;600&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <title>Vision Marks</title>
</head>

<body>
    <!-- Topbar -->
    <header class="topbar">
        <div class="topbar-container">
            <div class="logo">
                <h1>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"
                        style="width:1.2em;height:1.2em;vertical-align:middle;margin-right:1px">
                        <path fill="currentColor" fill-rule="nonzero"
                            d="M17.25 2A2.75 2.75 0 0 1 20 4.75V19.25a2.75 2.75 0 0 1-2.75 2.75H6.75A2.75 2.75 0 0 1 4 19.249V4.75A2.75 2.75 0 0 1 6.75 2L7.04 2v8.167c0 .748.79 1.014 1.319.74l.09-.055 2.093-1.197 2.14 1.23c.446.308 1.261.1 1.35-.59l.008-.128V2zm-4.709 0v7.076l-1.621-.932a.93.93 0 0 0-.793.022l-.107.063-1.479.846V2z" />
                    </svg>
                    MyBookmarks
                </h1>
            </div>

            <div class="search-bar">
                <input type="text" placeholder="Buscar marcadores... (Ctrl+K)" id="searchInput" autocomplete="off">
                <!-- El dropdown se insertará aquí automáticamente -->
            </div>

            <!-- Acciones: Settings + Profile -->
            <div class="topbar-actions">
                <!-- Botón Configuración -->
                <button class="icon-btn" id="settingsBtn" aria-label="Configuración" title="Configuración">
                    <span class="icon-wrapper" data-svg="config"></span>
                </button>

                <!-- Botón Perfil -->
                <button class="icon-btn" id="profileBtn" aria-label="Perfil" title="Perfil">
                    <span class="icon-wrapper" data-svg="profile"></span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Dashboard -->
    <main class="dashboard">
        <div class="dashboard-grid" id="dashboardGrid">

            <!-- FavBookmarks -->
            <div class="container-item" data-container="favbookmarks">
                <div class="container-header">
                    <h2>
                        <span class="icon-wrapper" data-svg="favorite" data-svg-class="icon-container"></span>
                        Favoritos
                    </h2>
                    <div class="container-actions">
                        <button class="btn-add" data-action="addBookmark" data-target="favbookmarks"
                            title="Añadir marcador">
                            <span class="icon-wrapper" data-svg="add"></span>
                        </button>
                    </div>
                </div>
                <div class="container-content">
                    <div class="container-body scrollable">
                        <div class="empty-state" id="emptyFavBookmarks">
                            <p>No hay favoritos aún</p>
                        </div>
                        <ul class="bookmark-list" id="favBookmarksList">
                            <!-- Los marcadores favoritos se renderizarán aquí -->
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Folders -->
            <div class="container-item" data-container="folders">
                <div class="container-header">
                    <h2>
                        <span class="icon-wrapper" data-svg="folder" data-svg-class="icon-container"></span>
                        Carpetas
                    </h2>
                    <div class="container-actions">
                        <button class="btn-add" data-action="addFolder" data-target="folders" title="Nueva carpeta">
                            <span class="icon-wrapper" data-svg="add"></span>
                        </button>
                    </div>
                </div>
                <div class="container-content">
                    <div class="container-body">
                        <div class="folders-grid" id="foldersGrid">
                            <!-- Las carpetas se renderizarán aquí -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- InFolder -->
            <div class="container-item" data-container="infolder">
                <div class="container-header">
                    <h2><span id="currentFolderName">Contenido</span></h2>
                    <div class="container-actions">
                        <button class="btn-add" data-action="addBookmark" data-target="infolder"
                            title="Añadir marcador">
                            <span class="icon-wrapper" data-svg="add"></span>
                        </button>
                        <button class="btn-back hidden" id="btnBackToFolders" title="Volver a carpetas">
                            <span class="icon-wrapper" data-svg="back"></span>
                        </button>
                    </div>
                </div>
                <div class="container-content">
                    <div class="container-body scrollable">
                        <div class="empty-state" id="emptyInFolder">
                            <p>Selecciona una carpeta o añade marcadores</p>
                        </div>
                        <ul class="bookmark-list" id="inFolderList">
                            <!-- Los marcadores de la carpeta se renderizarán aquí -->
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Chat -->
            <div class="container-item" data-container="chat">
                <div class="container-header">
                    <h2>
                        <span class="icon-wrapper" data-svg="chat" data-svg-class="icon-container"></span>
                        Asistente
                    </h2>
                    <div class="container-actions">
                        <!-- Sin botones en chat por ahora -->
                    </div>
                </div>
                <div class="container-content">
                    <div class="container-body chat-container">
                        <div class="chat-messages" id="chatMessages">
                            <div class="chat-message bot">
                                <p>¡Hola! Puedo ayudarte a encontrar marcadores. ¿Qué buscas?</p>
                            </div>
                        </div>
                        <div class="chat-input-area">
                            <input type="text" placeholder="Pregunta sobre tus marcadores..." id="chatInput">
                            <button class="btn-send" id="btnSendChat">
                                <span class="icon-wrapper" data-svg="send"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Widgets -->
            <div class="container-item" data-container="widgets-1" style="display:none;">
                <div class="container-header">
                    <h2>
                        <span class="icon-wrapper" data-svg="widget" data-svg-class="icon-container"></span>
                        Widget 1
                    </h2>
                    <div class="container-actions">
                        <button class="btn-add" title="Configurar widget">
                            <span class="icon-wrapper" data-svg="config"></span>
                        </button>
                    </div>
                </div>
                <div class="container-content">
                    <div class="container-body">
                        <div class="widget-placeholder">
                            <p>Widget 1</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="container-item" data-container="widgets-2" style="display:none;">
                <div class="container-header">
                    <h2>
                        <span class="icon-wrapper" data-svg="widget" data-svg-class="icon-container"></span>
                        Widget 2
                    </h2>
                    <div class="container-actions">
                        <button class="btn-add" title="Configurar widget">
                            <span class="icon-wrapper" data-svg="config"></span>
                        </button>
                    </div>
                </div>
                <div class="container-content">
                    <div class="container-body">
                        <div class="widget-placeholder">
                            <p>Widget 2</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="container-item" data-container="widgets-3" style="display:none;">
                <div class="container-header">
                    <h2>
                        <span class="icon-wrapper" data-svg="widget" data-svg-class="icon-container"></span>
                        Widget 3
                    </h2>
                    <div class="container-actions">
                        <button class="btn-add" title="Configurar widget">
                            <span class="icon-wrapper" data-svg="config"></span>
                        </button>
                    </div>
                </div>
                <div class="container-content">
                    <div class="container-body">
                        <div class="widget-placeholder">
                            <p>Widget 3</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="container-item" data-container="widgets-4" style="display:none;">
                <div class="container-header">
                    <h2>
                        <span class="icon-wrapper" data-svg="widget" data-svg-class="icon-container"></span>
                        Widget 4
                    </h2>
                    <div class="container-actions">
                        <button class="btn-add" title="Configurar widget">
                            <span class="icon-wrapper" data-svg="config"></span>
                        </button>
                    </div>
                </div>
                <div class="container-content">
                    <div class="container-body">
                        <div class="widget-placeholder">
                            <p>Widget 4</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="js/modules/storage.js"></script>
    <script src="js/modules/state.js"></script>
    <script src="js/modules/settings.js"></script>
    <script src="js/modules/modals.js"></script>
    <script src="js/modules/bookmarks.js"></script>
    <script src="js/modules/folders.js"></script>
    <script src="js/modules/render.js"></script>
    <script src="js/modules/reorder.js"></script>
    <script src="js/modules/database.js"></script>
    <script src="js/modules/search.js"></script>
    <script src="js/modules/importExport.js"></script>
    <script src="js/modules/iconManager.js"></script>
    <script src="js/utils/svg-loader.js"></script>
    <script src="js/modules/events.js"></script>
    <script src="js/modules/chat.js"></script>
    <script src="js/app.js" defer></script>
</body>

</html>
