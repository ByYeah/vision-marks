<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestor ligero de marcadores web">
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    <title>Vision Marks</title>
</head>

<body>
    <!-- Topbar -->
    <header class="topbar">
        <div class="topbar-container">
            <div class="logo">
                <h1>📑 Bookmarks</h1>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Buscar marcadores..." id="searchInput">
                <button class="search-btn" aria-label="Buscar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
            </div>
            <div class="topbar-actions">
                <button class="icon-btn" id="settingsBtn" aria-label="Configuración">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M12 1v6m0 6v6m4.22-10.22l4.24-4.24M6.34 17.66l-4.24 4.24M23 12h-6m-6 0H1m20.24 4.24l-4.24-4.24M6.34 6.34L2.1 2.1">
                        </path>
                    </svg>
                </button>
                <button class="icon-btn" id="profileBtn" aria-label="Perfil">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Dashboard -->
    <main class="dashboard">
        <div class="dashboard-grid" id="dashboardGrid">

            <!-- Container: FavBookmarks -->
            <div class="container-item" data-container="favbookmarks">
                <div class="container-header">
                    <h2>⭐ Favoritos</h2>
                    <div class="container-actions">
                        <button class="btn-add" data-action="addBookmark" data-target="favbookmarks"
                            title="Añadir marcador">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                        <button class="btn-toggle" data-action="toggleContainer" title="Minimizar">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="container-content">
                    <div class="container-body scrollable">
                        <div class="empty-state" id="emptyFavBookmarks">
                            <p>No hay favoritos aún</p>
                        </div>
                        <ul class="bookmark-list" id="favBookmarksList">
                            <!-- Los marcadores favoritos se renderizarán aquí -->
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Container: Folders -->
            <div class="container-item" data-container="folders">
                <div class="container-header">
                    <h2>📁 Carpetas</h2>
                    <div class="container-actions">
                        <button class="btn-add" data-action="addFolder" data-target="folders" title="Nueva carpeta">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                        <button class="btn-toggle" data-action="toggleContainer" title="Minimizar">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="container-content">
                    <div class="container-body">
                        <div class="folders-grid" id="foldersGrid">
                            <!-- Las carpetas se renderizarán aquí -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Container: InFolder -->
            <div class="container-item" data-container="infolder">
                <div class="container-header">
                    <h2>📄 <span id="currentFolderName">Contenido</span></h2>
                    <div class="container-actions">
                        <button class="btn-add" data-action="addBookmark" data-target="infolder"
                            title="Añadir marcador">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                        <button class="btn-back hidden" id="btnBackToFolders" title="Volver a carpetas">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                        <button class="btn-toggle" data-action="toggleContainer" title="Minimizar">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="container-content">
                    <div class="container-body scrollable">
                        <div class="empty-state" id="emptyInFolder">
                            <p>Selecciona una carpeta o añade marcadores</p>
                        </div>
                        <ul class="bookmark-list" id="inFolderList">
                            <!-- Los marcadores de la carpeta se renderizarán aquí -->
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Container: Chat -->
            <div class="container-item" data-container="chat">
                <div class="container-header">
                    <h2>💬 Asistente</h2>
                    <div class="container-actions">
                        <button class="btn-toggle" data-action="toggleContainer" title="Minimizar">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="container-content">
                    <div class="container-body chat-container">
                        <div class="chat-messages" id="chatMessages">
                            <div class="chat-message bot">
                                <p>¡Hola! Puedo ayudarte a encontrar marcadores. ¿Qué buscas?</p>
                            </div>
                        </div>
                        <div class="chat-input-area">
                            <input type="text" placeholder="Pregunta sobre tus marcadores..." id="chatInput">
                            <button class="btn-send" id="btnSendChat">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Modals (se implementarán en F2) -->
    <div id="modalsContainer"></div>

    <!-- Scripts -->
    <script src="js/app.js" defer></script>
</body>

</html>
